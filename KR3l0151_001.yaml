body:
  text: 宣驗記丁零相州鄴城中有丈六銅立相一軀賊丁零者志性兇悖無有信心乃彎弓射像箭中像面血下交流雖加瑩飾血痕猶在又選五百力士令挽仆地消鑄為銅擬充器用乃口發大聲響烈雷震力士亡魂喪膽人皆仆地迷悶宛轉怖不能起由是賊侶慚惶歸信者眾丁零後時著疾被誅乃死王遵唐王遵者河內人也兄弟三人並時疾甚宅有鵲巢旦夕翔鳴忿其喧噪兄弟共惡之及病差因張鵲斷舌而放之既而兄弟皆患口齒之疾家漸貧以至行乞逐賊元嘉元年建安郡山賊百餘人掩破郡治抄掠百姓子女資產遂入佛圖搜掠財寶先是諸供養具悉封置一室賊破戶忽有蜜蜂數萬頭從衣簏出同時噬螫群賊身首腫痛眼皆盲合先諸所掠皆棄而走
